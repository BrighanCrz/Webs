<!doctype html><html lang="es"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>StoreMC</title><style>body{margin:0;background:#090d1b;color:#edf2ff;font:15px Arial}button,input,select{font:inherit}button{cursor:pointer}.hide{display:none!important}.login{min-height:100vh;display:grid;place-items:center}.box{width:min(430px,90%);background:#131d34;border:1px solid #32435f;border-radius:15px;padding:30px;text-align:center}.logo{width:70px;height:70px;object-fit:contain;border-radius:12px;background:#273b62}.blue{color:#67c9ff}.muted{color:#a6b3c9}input,select{width:100%;padding:11px;box-sizing:border-box;background:#0a1223;border:1px solid #34455f;border-radius:7px;color:#fff;margin:6px 0 14px}label{display:block;text-align:left;font-size:12px}button{border:0;border-radius:7px;padding:11px 14px;background:#7656eb;color:#fff;font-weight:bold}.link{background:none;color:#9dcfff}header{height:70px;display:flex;justify-content:space-between;align-items:center;padding:0 7%;background:#101a2e}.brand{display:flex;gap:10px;align-items:center;font-size:20px;font-weight:bold}.brand img{width:39px;height:39px;object-fit:contain}.hero{padding:80px 12%;background:linear-gradient(120deg,#17265a,#0a1020)}.hero h1{font-size:52px;margin:0}.products{padding:40px 8%;display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:17px}.product{background:#121d33;border:1px solid #31435f;border-radius:11px;overflow:hidden}.product img{width:100%;height:130px;object-fit:cover;background:#263c66}.product div{padding:14px}.product p{color:#aebbd2;font-size:12px}.admin{display:flex;min-height:100vh}.side{width:230px;background:#10192c;padding:20px}.side button{display:block;width:100%;text-align:left;background:none;margin:4px 0}.side button.active{background:#293d69}.main{flex:1;padding:32px}.panel{background:#121d33;border:1px solid #31435f;border-radius:11px;padding:20px;max-width:780px}.row{display:flex;gap:10px;align-items:center;justify-content:space-between;border-bottom:1px solid #2b3b55;padding:12px 0}.row img{width:52px;height:42px;object-fit:cover}.danger{background:#823452}.ok{background:#217657}.top{display:flex;justify-content:space-between}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:650px){.side{width:62px;padding:10px}.side h2,.side button{font-size:0}.side button{font-size:18px}.main{padding:18px}.hero{padding:55px 8%}}</style><body><section id="login" class="login"><div class="box"><img class="logo" id="loginLogo"><h1 id="loginTitle">StoreMC</h1><p class="muted">Panel seguro de administracion</p><form id="loginForm"><label>Usuario</label><input id="user" required><label>Contrasena</label><input id="pass" type="password" required><button>Entrar</button></form><p id="bad" class="blue"></p></div></section><section id="admin" class="admin hide"><aside class="side"><h2>StoreMC</h2><button class="active" data-v="stores">Tiendas</button><button data-v="store">Editar tienda</button><button data-v="products">Productos</button><button data-v="account">Cuenta</button><button id="exit">Salir</button></aside><main class="main"><div class="top"><h1 id="title">Tiendas</h1><button id="view">Ver tienda</button></div><div id="content"></div></main></section><section id="shop" class="hide"><header><div class="brand"><img id="shopLogo"><span id="shopName"></span></div><button id="backAdmin">Admin</button></header><div class="hero"><h1 id="heroName"></h1><p id="shopIp" class="blue"></p></div><div id="grid" class="products"></div></section><script>const $=s=>document.querySelector(s);let data=JSON.parse(localStorage.getItem('storemc-data')||'null')||{account:{user:'admin',pass:'cambiar123'},stores:[{id:1,name:'Mi servidor',ip:'play.miservidor.net',logo:'',products:[{id:1,name:'Rango VIP',price:'9.99',desc:'Beneficios VIP',image:''}]}],active:1};const save=()=>localStorage.setItem('storemc-data',JSON.stringify(data));const st=()=>data.stores.find(x=>x.id==data.active);function go(v){$('#title').textContent={stores:'Mis tiendas',store:'Editar tienda',products:'Productos',account:'Cuenta'}[v];$('#content').innerHTML=v==='stores'?`<div class="panel"><button id="newStore">+ Agregar tienda</button>${data.stores.map(x=>`<div class="row"><b>${x.name}</b><button data-select="${x.id}">Editar</button></div>`).join('')}</div>`:v==='store'?`<div class="panel"><label>Nombre de tienda</label><input id="sname" value="${st().name}"><label>IP del servidor</label><input id="sip" value="${st().ip}"><label>URL del logo (imagen)</label><input id="slogo" value="${st().logo}" placeholder="https://..."><button id="saveStore">Guardar tienda</button></div>`:v==='products'?`<div class="panel"><button id="newProduct">+ Agregar producto</button>${st().products.map(p=>`<div class="row"><img src="${p.image}" onerror="this.style.display='none'"><span><b>${p.name}</b><br>$${p.price}</span><button data-p="${p.id}">Editar</button><button class="danger" data-d="${p.id}">Eliminar</button></div>`).join('')}</div>`:`<div class="panel"><label>Nuevo usuario</label><input id="auser" value="${data.account.user}"><label>Nueva contrasena</label><input id="apass" type="password" placeholder="Deja vacio para conservar"><button id="saveAccount">Guardar cuenta</button></div>`;bind(v)}function bind(v){$('#newStore')?.addEventListener('click',()=>{let n=prompt('Nombre de la nueva tienda');if(n){data.stores.push({id:Date.now(),name:n,ip:'play.servidor.net',logo:'',products:[]});save();go('stores')}});document.querySelectorAll('[data-select]').forEach(b=>b.onclick=()=>{data.active=+b.dataset.select;save();go('store')});$('#saveStore')?.addEventListener('click',()=>{Object.assign(st(),{name:$('#sname').value,ip:$('#sip').value,logo:$('#slogo').value});save();go('store')});$('#newProduct')?.addEventListener('click',()=>edit());document.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>edit(st().products.find(x=>x.id==b.dataset.p)));document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{st().products=st().products.filter(x=>x.id!=b.dataset.d);save();go('products')});$('#saveAccount')?.addEventListener('click',()=>{data.account.user=$('#auser').value;if($('#apass').value)data.account.pass=$('#apass').value;save();alert('Cuenta actualizada')})}function edit(p){let n=prompt('Nombre',p?.name||'');if(!n)return;let price=prompt('Precio',p?.price||'');let desc=prompt('Descripcion',p?.desc||'');let image=prompt('URL de imagen para producto',p?.image||'');let o={id:p?.id||Date.now(),name:n,price,desc,image};st().products=p?st().products.map(x=>x.id==p.id?o:x):[...st().products,o];save();go('products')}$('#loginForm').onsubmit=e=>{e.preventDefault();if($('#user').value===data.account.user&&$('#pass').value===data.account.pass){$('#login').classList.add('hide');$('#admin').classList.remove('hide');go('stores')}else $('#bad').textContent='Datos incorrectos'};document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>go(b.dataset.v));$('#exit').onclick=()=>location.reload();function showShop(){$('#admin').classList.add('hide');$('#shop').classList.remove('hide');let x=st();$('#shopName').textContent=x.name;$('#heroName').textContent=x.name;$('#shopIp').textContent=x.ip;$('#shopLogo').src=x.logo;$('#grid').innerHTML=x.products.map(p=>`<article class="product"><img src="${p.image}" onerror="this.style.display='none'"><div><b>${p.name}</b><p>${p.desc}</p><strong>$${p.price}</strong></div></article>`).join('')}$('#view').onclick=showShop;$('#backAdmin').onclick=()=>{$('#shop').classList.add('hide');$('#admin').classList.remove('hide')};</script></body></html>
